<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Bloxd Leaderboard</title>
<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0b1220;
    color: #e2e8f0;
  }
  .wrap {
    max-width: 900px;
    margin: 30px auto;
    padding: 20px;
  }
  .card {
    background: #111827;
    border: 1px solid #1e3a5f;
    border-radius: 16px;
    padding: 24px;
  }
  input {
    width: 100%;
    padding: 12px;
    margin: 8px 0;
    border-radius: 10px;
    border: 1px solid #334155;
    background: #0f172a;
    color: white;
    box-sizing: border-box;
  }
  button {
    background: #0ea5e9;
    color: white;
    border: none;
    padding: 10px 16px;
    border-radius: 10px;
    cursor: pointer;
    font-weight: bold;
    margin: 4px 4px 4px 0;
  }
  button:hover {
    background: #0284c7;
  }
  .hidden { display: none; }
  table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 16px;
  }
  th, td {
    padding: 10px;
    border-bottom: 1px solid #1e293b;
    text-align: left;
  }
  th { color: #94a3b8; }
  .admin-btn {
    background: #22c55e;
  }
  .msg {
    margin-top: 12px;
    color: #f87171;
  }
  .success {
    color: #4ade80;
  }
</style>
</head>
<body>
<div class="wrap">

  <!-- LOGIN -->
  <div id="loginBox" class="card">
    <h2>Login / Register</h2>
    <input id="username" placeholder="Username">
    <input id="password" type="password" placeholder="Password">
    <br>
    <button onclick="doLogin()">Login</button>
    <button onclick="doRegister()">Register</button>
    <div id="message" class="msg"></div>
    <div style="margin-top:16px; color:#94a3b8; font-size:14px;">
      Owner account:<br>
      <b>Priyansh_the_king</b> / <b>123PRV</b>
    </div>
  </div>

  <!-- MAIN APP -->
  <div id="app" class="card hidden">
    <div style="display:flex; justify-content:space-between; align-items:center;">
      <h2>⚔ Bloxd Leaderboard</h2>
      <div>
        <button id="adminButton" class="admin-btn hidden" onclick="alert('You are Owner / Admin!')">🛡 Admin Panel</button>
        <button onclick="doLogout()">Logout</button>
      </div>
    </div>

    <p>Logged in as: <b id="who"></b> <span id="roleBadge"></span></p>

    <div>
      <button onclick="setTab('overall')">Overall</button>
      <button onclick="setTab('cart')">Cart</button>
      <button onclick="setTab('crystel')">Crystel</button>
      <button onclick="setTab('mace')">Mace</button>
      <button onclick="setTab('sword')">Sword</button>
      <button onclick="setTab('kit')">Kit</button>
    </div>

    <table>
      <thead id="head"></thead>
      <tbody id="body"></tbody>
    </table>
  </div>

</div>

<script>
const STORAGE = "bloxd_clean_v1";

let data = null;
let current = null;
let currentTab = "overall";

function save() {
  localStorage.setItem(STORAGE, JSON.stringify(data));
}

function load() {
  const raw = localStorage.getItem(STORAGE);
  if (raw) {
    try {
      data = JSON.parse(raw);
    } catch(e) {
      data = null;
    }
  }

  if (!data || !data.users) {
    data = {
      users: [
        {
          username: "Priyansh_the_king",
          password: "123PRV",
          isOwner: true,
          isAdmin: true,
          stats: { cart: 20, crystel: 15, mace: 10, sword: 18, kit: 9 }
        },
        {
          username: "player1",
          password: "player1",
          isOwner: false,
          isAdmin: false,
          stats: { cart: 8, crystel: 6, mace: 4, sword: 9, kit: 5 }
        }
      ]
    };
    save();
  }

  // Always force the owner account
  let owner = data.users.find(u => u.username.toLowerCase() === "priyansh_the_king");
  if (!owner) {
    owner = {
      username: "Priyansh_the_king",
      password: "123PRV",
      isOwner: true,
      isAdmin: true,
      stats: { cart: 20, crystel: 15, mace: 10, sword: 18, kit: 9 }
    };
    data.users.push(owner);
  } else {
    owner.password = "123PRV";
    owner.isOwner = true;
    owner.isAdmin = true;
  }
  save();
}

function showMessage(text, isSuccess = false) {
  const el = document.getElementById("message");
  el.textContent = text;
  el.className = isSuccess ? "msg success" : "msg";
}

function doLogin() {
  const username = document.getElementById("username").value.trim();
  const password = document.getElementById("password").value;

  if (!username || !password) {
    showMessage("Please enter username and password");
    return;
  }

  load(); // force latest data

  const user = data.users.find(u => u.username.toLowerCase() === username.toLowerCase());

  if (!user) {
    showMessage("Username not found. Try Register or check spelling.");
    return;
  }

  if (user.password !== password) {
    showMessage("Wrong password");
    return;
  }

  // Force owner powers
  if (user.username.toLowerCase() === "priyansh_the_king") {
    user.isOwner = true;
    user.isAdmin = true;
    save();
  }

  current = user;
  enterApp();
}

function doRegister() {
  const username = document.getElementById("username").value.trim();
  const password = document.getElementById("password").value;

  if (!username || !password) {
    showMessage("Please enter username and password");
    return;
  }

  load();

  if (data.users.some(u => u.username.toLowerCase() === username.toLowerCase())) {
    showMessage("Username already exists. Try Login instead.");
    return;
  }

  const newUser = {
    username: username,
    password: password,
    isOwner: false,
    isAdmin: false,
    stats: { cart: 0, crystel: 0, mace: 0, sword: 0, kit: 0 }
  };

  data.users.push(newUser);
  save();
  current = newUser;
  enterApp();
}

function enterApp() {
  document.getElementById("loginBox").classList.add("hidden");
  document.getElementById("app").classList.remove("hidden");
  document.getElementById("who").textContent = current.username;

  const role = current.isOwner ? "👑 Owner" : current.isAdmin ? "🛡 Admin" : "Player";
  document.getElementById("roleBadge").textContent = "(" + role + ")";

  // Show admin button only for owner/admin
  const adminBtn = document.getElementById("adminButton");
  if (current.isOwner || current.isAdmin) {
    adminBtn.classList.remove("hidden");
  } else {
    adminBtn.classList.add("hidden");
  }

  render();
}

function doLogout() {
  current = null;
  document.getElementById("app").classList.add("hidden");
  document.getElementById("loginBox").classList.remove("hidden");
  document.getElementById("username").value = "";
  document.getElementById("password").value = "";
  showMessage("");
}

function setTab(tab) {
  currentTab = tab;
  render();
}

function getTotal(user) {
  return (user.stats.cart || 0) + (user.stats.crystel || 0) +
         (user.stats.mace || 0) + (user.stats.sword || 0) + (user.stats.kit || 0);
}

function changeStat(username, key, amount) {
  if (!current || (!current.isOwner && !current.isAdmin)) return;

  const user = data.users.find(u => u.username === username);
  if (!user) return;

  user.stats[key] = Math.max(0, (user.stats[key] || 0) + amount);
  save();
  render();
}

function render() {
  const head = document.getElementById("head");
  const body = document.getElementById("body");
  body.innerHTML = "";

  let list = [...data.users];

  if (currentTab === "overall") {
    list.sort((a, b) => getTotal(b) - getTotal(a));
    head.innerHTML = "<tr><th>Rank</th><th>Player</th><th>Cart</th><th>Crystel</th><th>Mace</th><th>Sword</th><th>Kit</th><th>Total</th></tr>";
  } else {
    list.sort((a, b) => (b.stats[currentTab] || 0) - (a.stats[currentTab] || 0));
    head.innerHTML = `<tr><th>Rank</th><th>Player</th><th>${currentTab.toUpperCase()}</th></tr>`;
  }

  list.forEach((user, index) => {
    const tr = document.createElement("tr");
    const canEdit = current && (current.isOwner || current.isAdmin);

    if (currentTab === "overall") {
      tr.innerHTML = `
        <td>${index + 1}</td>
        <td><b>${user.username}</b> ${user.isOwner ? "👑" : user.isAdmin ? "🛡" : ""}</td>
        <td>${user.stats.cart || 0}</td>
        <td>${user.stats.crystel || 0}</td>
        <td>${user.stats.mace || 0}</td>
        <td>${user.stats.sword || 0}</td>
        <td>${user.stats.kit || 0}</td>
        <td><b>${getTotal(user)}</b></td>
      `;
    } else {
      tr.innerHTML = `
        <td>${index + 1}</td>
        <td><b>${user.username}</b></td>
        <td>
          ${canEdit ? `<button onclick="changeStat('${user.username}','${currentTab}',-1)">-</button>` : ""}
          ${user.stats[currentTab] || 0}
          ${canEdit ? `<button onclick="changeStat('${user.username}','${currentTab}',1)">+</button>` : ""}
        </td>
      `;
    }

    body.appendChild(tr);
  });
}

// Start
load();
</script>
</body>
</html>
