<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Bloxd Leaderboard</title>

<style>
:root{
  --accent:#00bfff;
  --text:#e2e8f0;
  --muted:#94a3b8;
}

*{
  box-sizing:border-box;
}

body{
  margin:0;
  font-family:Arial;
  background:
  radial-gradient(circle at top,#0b2447 0%,#071029 40%,#030712 100%);
  color:var(--text);
  overflow-x:hidden;
}

/* animated background */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:
  linear-gradient(90deg,transparent,rgba(0,191,255,.08),transparent);
  animation:bgMove 8s linear infinite;
  pointer-events:none;
}

@keyframes bgMove{
  from{transform:translateX(-100%);}
  to{transform:translateX(100%);}
}

.wrap{
  max-width:1100px;
  margin:auto;
  padding:20px;
}

.card{
  position:relative;
  background:rgba(10,20,40,0.88);
  border:1px solid rgba(0,191,255,0.25);
  border-radius:18px;
  padding:18px;
  box-shadow:0 0 25px rgba(0,191,255,0.15);
  backdrop-filter:blur(8px);
  animation:fadeUp .6s ease;
}

@keyframes fadeUp{
  from{
    opacity:0;
    transform:translateY(20px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
}

/* LOGIN */
.loginBox{
  max-width:420px;
  margin:40px auto;
}

/* BUTTONS */
button{
  background:rgba(0,191,255,0.08);
  border:1px solid rgba(0,191,255,0.35);
  padding:8px 12px;
  border-radius:10px;
  cursor:pointer;
  color:var(--text);
  font-weight:bold;
  transition:.2s;
}

button:hover{
  transform:translateY(-2px) scale(1.03);
  background:rgba(0,191,255,0.22);
  box-shadow:0 0 16px rgba(0,191,255,0.5);
}

button.active{
  background:linear-gradient(90deg,#00bfff,#008cff);
  color:white;
  box-shadow:0 0 14px rgba(0,191,255,.7);
}

/* INPUT */
input{
  width:92%;
  padding:10px;
  margin:6px 0;
  border-radius:10px;
  border:1px solid rgba(0,191,255,0.25);
  background:rgba(255,255,255,0.05);
  color:var(--text);
  outline:none;
}

input:focus{
  border-color:#00bfff;
  box-shadow:0 0 12px rgba(0,191,255,0.4);
}

/* TABLE */
table{
  width:100%;
  border-collapse:collapse;
}

td,th{
  padding:12px;
  border-bottom:1px solid rgba(255,255,255,0.08);
}

tr{
  transition:.2s;
}

tr:hover{
  background:rgba(0,191,255,0.08);
}

th{
  color:var(--muted);
  text-align:left;
}

.hidden{
  display:none;
}

.rank{
  font-size:12px;
  color:var(--muted);
}

.arrowBtn{
  padding:2px 8px;
  margin:0 3px;
  color:#00bfff;
}

/* TOP 3 GLOW */
.gold{
  box-shadow:0 0 18px rgba(255,215,0,0.35);
}

.silver{
  box-shadow:0 0 18px rgba(192,192,192,0.30);
}

.bronze{
  box-shadow:0 0 18px rgba(205,127,50,0.30);
}

/* RETIRED / BAN */
.retired{
  color:orange;
  font-size:12px;
}

.tab{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  margin-bottom:15px;
}

/* profile button */
.profileBtn{
  position:absolute;
  right:18px;
  top:18px;
}

.adminBtn{
  position:absolute;
  right:110px;
  top:18px;
}

/* AI box */
.aiBox{ margin-top:15px; padding:14px; border-radius:14px; background:rgba(0,191,255,0.08); border:1px solid rgba(0,191,255,0.2); animation:pulse 2s infinite; }
@keyframes pulse{ 0%{box-shadow:0 0 0 rgba(0,191,255,0);} 50%{box-shadow:0 0 20px rgba(0,191,255,.25);} 100%{box-shadow:0 0 0 rgba(0,191,255,0);} }
.aiTitle{ color:#00bfff; font-weight:bold; margin-bottom:6px; }
.bottomNav{ display:flex; gap:8px; flex-wrap:wrap; margin-top:16px; }
.communityPage{ margin-top:12px; padding:12px; border:1px solid rgba(0,191,255,0.2); border-radius:14px; background:rgba(255,255,255,0.04); }
.communityItem,.communityCard{ padding:10px; border-radius:10px; background:rgba(0,191,255,0.07); margin-bottom:8px; }
.small{ font-size:12px; color:var(--muted); }
textarea, input{ width:100%; padding:10px; margin:6px 0; border-radius:10px; border:1px solid rgba(0,191,255,0.25); background:rgba(255,255,255,0.05); color:var(--text); }
.chatBox{ max-height:420px; overflow:auto; display:flex; flex-direction:column; gap:8px; padding:8px; background:rgba(0,0,0,0.15); border-radius:12px; }
.chatBubble{ padding:8px 10px; border-radius:12px; background:rgba(0,191,255,0.12); }
.chatBubble strong{ color:#7dd3fc; }
.fullPageCommunity{ position:fixed; inset:0; background:rgba(3,7,18,0.96); z-index:999; overflow:auto; padding:20px; }
.fullPageCommunity .card{ max-width:900px; margin:20px auto; }
</style>
</head>

<body>

<div class="wrap">

<!-- LOGIN -->
<div id="auth" class="card loginBox">
<h2>Login / Register</h2>

<input id="user" placeholder="username">
<input id="pass" type="password" placeholder="password">

<button onclick="login()">Login</button>
<button onclick="register()">Register</button>

<div id="msg"></div>
<div style="margin-top:12px;font-size:13px;color:#94a3b8;">
  Owner: <b>Priyansh_the_king</b> / <b>123PRV</b>
</div>
</div>

<!-- APP -->
<div id="app" class="hidden">

<div class="card">

<button class="adminBtn hidden" id="adminBtn" onclick="openAdminPage()">🛡 Admin</button>
<button class="profileBtn" onclick="openProfile()">👤 Profile</button>

<h2>⚔ Bloxd Leaderboard</h2>

<div class="tab">
<button id="overallBtn" onclick="setTab('overall')">Overall</button>
<button id="cartBtn" onclick="setTab('cart')">Cart</button>
<button id="crystelBtn" onclick="setTab('crystel')">Crystel</button>
<button id="maceBtn" onclick="setTab('mace')">Mace</button>
<button id="swordBtn" onclick="setTab('sword')">Sword</button>
<button id="kitBtn" onclick="setTab('kit')">Kit</button>
</div>

<input id="search" placeholder="Search player..." oninput="render()">

<table>
<thead id="tableHead"></thead>
<tbody id="board"></tbody>
</table>

<div class="aiBox">
<div class="aiTitle">🤖 AI PvP Analysis</div>
<div id="aiText">Loading AI analysis...</div>
</div>

<div class="bottomNav">
<button onclick="showCommunityPage('info')">ℹ Info</button>
<button onclick="showCommunityPage('news')">📰 News</button>
<button onclick="showCommunityPage('talk')">💬 Talk</button>
<button onclick="showCommunityPage('pvp')">⚔ PVP Fights</button>
<button onclick="showCommunityPage('challenge')">🎯 Challenge</button>
</div>

<div id="communityOverlay" class="fullPageCommunity hidden"></div>

<br>
<button onclick="logout()">Logout</button>

</div>
</div>

<!-- PROFILE -->
<div id="profilePage" class="hidden">

<div class="card">

<button onclick="closeProfile()">⬅ Back</button>

<h2>👤 Player Profile</h2>

<div id="profileInfo"></div>

<br>

<button onclick="changeName()">✏ Change Name</button>

<button onclick="changePassword()">🔒 Change Password</button>

<button onclick="toggleRetire()" id="retireBtn">🏁 Retire</button>

<button onclick="deleteAccount()">❌ Delete Account</button>

</div>

</div>

<!-- ADMIN -->
<div id="adminPage" class="hidden">
<div class="card">
<button onclick="closeAdminPage()">⬅ Back</button>
<h2>🛡 Admin Panel</h2>
<div class="tab">
<button onclick="setAdminFilter('all')">All</button>
<button onclick="setAdminFilter('banned')">Banned</button>
<button onclick="setAdminFilter('top10')">Top 10</button>
<button onclick="setAdminFilter('top50')">Top 50</button>
<button onclick="setAdminFilter('top100')">Top 100</button>
</div>
<table>
<thead>
<tr><th>Player</th><th>Status</th><th>Overall</th><th>Actions</th></tr>
</thead>
<tbody id="adminTable"></tbody>
</table>
</div>
</div>

<script>
const KEY = "bloxd_lb_v5_owner";

/* DATA */
let data = { users: [] };
let current = null;
let tab = "overall";
let adminFilter = "all";
let communityPage = "info";

function save(){
  try{ localStorage.setItem(KEY,JSON.stringify(data)); }catch(e){}
}

function $(id){ return document.getElementById(id); }
function escapeHtml(str){ return String(str||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function login(){
  const u = $("user").value.trim();
  const p = $("pass").value;
  if(!u || !p){ $("msg").innerHTML = 'Enter username and password'; return; }

  ensureOwnerAccount(); // force owner every time

  const user = data.users.find(x => x.u.toLowerCase() === u.toLowerCase());
  if(!user || user.p !== p){ $("msg").innerHTML = 'Invalid login'; return; }
  if(user.banned){ $("msg").innerHTML = 'Your account is banned'; return; }

  // Force owner powers
  if(user.u.toLowerCase() === 'priyansh_the_king'){
    user.owner = true;
    user.admin = true;
    user.newsReporter = true;
    save();
  }

  current = { ...user };
  enter();
}

function register(){
  const u = $("user").value.trim();
  const p = $("pass").value;
  if(!u || !p){ $("msg").innerHTML = 'Enter username and password'; return; }
  if(data.users.some(x => x.u.toLowerCase() === u.toLowerCase())){ $("msg").innerHTML = 'Username already exists'; return; }
  const user = {
    u,
    p,
    owner: false,
    admin: false,
    newsReporter: false,
    banned: false,
    retired: false,
    stats: { cart: 0, crystel: 0, mace: 0, sword: 0, kit: 0 }
  };
  data.users.push(user);
  save();
  current = { ...user };
  enter();
}

function enter(){
  $("auth").classList.add("hidden");
  $("app").classList.remove("hidden");
  render();
  const path = window.location.pathname;
  if(path.startsWith('/community/')){
    const page = path.split('/').pop();
    showCommunityPage(page);
  }
}

function logout(){
  current = null;
  $("app").classList.add("hidden");
  $("profilePage").classList.add("hidden");
  $("adminPage").classList.add("hidden");
  $("auth").classList.remove("hidden");
}

function openProfile(){
  if(!current) return;
  $("app").classList.add("hidden");
  $("profilePage").classList.remove("hidden");
  $("adminPage").classList.add("hidden");
  const rank = getPlayerRank(current);
  $("profileInfo").innerHTML=`
<b>Name:</b> ${escapeHtml(current.u)}<br><br>
<b>ELO:</b> ${getELO(current)}<br><br>
<b>Rank:</b> ${getRank(rank)}<br><br>
<b>Status:</b> ${current.retired?"🏁 Retired":"🟢 Active"}
`;
  if($("retireBtn")) $("retireBtn").textContent = current.retired ? "🔄 Unretire" : "🏁 Retire";
}

function closeProfile(){
  $("profilePage").classList.add("hidden");
  $("app").classList.remove("hidden");
}

function changeName(){
  if(!current) return;
  const newName = prompt('Enter a new username:');
  const password = prompt('Enter your current password to confirm:');
  if(!newName || !password) return;
  const user = data.users.find(u => u.u === current.u);
  if(!user || user.p !== password){ alert('Password incorrect'); return; }
  if(data.users.some(u => u.u.toLowerCase() === newName.trim().toLowerCase())){ alert('Username already exists'); return; }
  user.u = newName.trim();
  current.u = user.u;
  save();
  openProfile();
  render();
  alert('Name changed successfully.');
}

function changePassword(){
  if(!current) return;
  const currentPassword = prompt('Enter your current password:');
  const newPassword = prompt('Enter your new password:');
  if(!currentPassword || !newPassword) return;
  const user = data.users.find(u => u.u === current.u);
  if(!user || user.p !== currentPassword){ alert('Password incorrect'); return; }
  user.p = newPassword;
  save();
  alert('Password changed successfully.');
}

function toggleRetire(){
  if(!current) return;
  const user = data.users.find(u => u.u === current.u);
  if(!user) return;
  user.retired = !user.retired;
  current.retired = user.retired;
  save();
  if($("profileInfo")) openProfile();
  render();
}

function deleteAccount(){
  if(!current) return;
  const password = prompt('Enter your password to confirm deletion:');
  if(!password) return;
  const userIndex = data.users.findIndex(u => u.u === current.u && u.p === password);
  if(userIndex < 0){ alert('Password incorrect'); return; }
  data.users.splice(userIndex, 1);
  current = null;
  save();
  logout();
}

function setTab(t){ tab=t; render(); }
function canEdit(){ return current && (current.owner || current.admin); }
function getELO(u){ return (u.stats.cart||0)+(u.stats.crystel||0)+(u.stats.mace||0)+(u.stats.sword||0)+(u.stats.kit||0); }
function getPlayerRank(user){
  const list = [...data.users].filter(u => !u.retired && !u.banned).sort((a,b)=>getELO(b)-getELO(a));
  const index = list.findIndex(u => u.u === user.u);
  return index >= 0 ? index + 1 : 999;
}
function getRank(i){
  if(i<=3) return '👑 Grandmaster';
  if(i<=5) return '🏆 Master';
  if(i<=10) return '💎 Diamond';
  if(i<=15) return '🌙 Moonstone';
  return '⚔ Dominator';
}

function change(name,key,val){
  if(!canEdit()) return;
  const user = data.users.find(u => u.u === name);
  if(!user || !user.stats) return;
  user.stats[key] = Math.max(0, (user.stats[key] || 0) + val);
  save();
  render();
}

function updateAI(list){
  if(list.length===0){ $("aiText").innerHTML='No players found.'; return; }
  const top=list[0];
  $("aiText").innerHTML = `${escapeHtml(top.u)} is dominating the ${tab} leaderboard with ${getELO(top)} total ELO.`;
}

function openAdminPage(){
  if(!canEdit()) return;
  $("app").classList.add("hidden");
  $("profilePage").classList.add("hidden");
  $("adminPage").classList.remove("hidden");
  renderAdminPage();
}

function closeAdminPage(){
  $("adminPage").classList.add("hidden");
  $("app").classList.remove("hidden");
  render();
}

function setAdminFilter(filter){ adminFilter=filter; renderAdminPage(); }

function toggleBan(username){
  if(!canEdit()) return;
  const user = data.users.find(u => u.u === username);
  if(!user) return;
  user.banned = !user.banned;
  save();
  renderAdminPage();
  render();
}

function toggleAdmin(username){
  if(!current || !current.owner) return;
  const user = data.users.find(u => u.u === username);
  if(!user || user.owner) return;
  user.admin = !user.admin;
  save();
  renderAdminPage();
  render();
}

function toggleNewsReporter(username){
  if(!current || !current.owner) return;
  const user = data.users.find(u => u.u === username);
  if(!user || user.owner) return;
  user.newsReporter = !user.newsReporter;
  save();
  renderAdminPage();
  render();
}

function renderAdminPage(){
  const tbody = $("adminTable");
  if(!tbody) return;
  let list = [...data.users];
  if(adminFilter === 'banned'){ list = list.filter(u => u.banned); }
  else if(adminFilter === 'top10'){ list = list.sort((a,b)=>getELO(b)-getELO(a)).slice(0,10); }
  else if(adminFilter === 'top50'){ list = list.sort((a,b)=>getELO(b)-getELO(a)).slice(0,50); }
  else if(adminFilter === 'top100'){ list = list.sort((a,b)=>getELO(b)-getELO(a)).slice(0,100); }
  tbody.innerHTML = '';
  list.forEach(u => {
    const row = document.createElement('tr');
    const owner = current && current.owner;
    row.innerHTML = `
      <td><b>${escapeHtml(u.u)}</b></td>
      <td>${u.banned ? '🚫 Banned' : (u.retired ? '🏁 Retired' : '🟢 Active')} ${u.newsReporter ? '📰' : ''}</td>
      <td>${getELO(u)}</td>
      <td>
        ${canEdit()?`<button onclick="toggleBan('${u.u}')">${u.banned?'Unban':'Ban'}</button>`:''}
        ${owner && !u.owner?`<button onclick="toggleAdmin('${u.u}')">${u.admin?'Remove Admin':'Give Admin'}</button>`:''}
        ${owner && !u.owner?`<button onclick="toggleNewsReporter('${u.u}')">${u.newsReporter?'Remove Reporter':'Make Reporter'}</button>`:''}
      </td>`;
    tbody.appendChild(row);
  });
}

function render(){
  const adminBtn = $("adminBtn");
  if(adminBtn){ adminBtn.classList.toggle("hidden", !canEdit()); }
  document.querySelectorAll(".tab button").forEach(b=>{ b.classList.remove("active"); });
  if($(tab+"Btn")){ $(tab+"Btn").classList.add("active"); }
  let b=$("board");
  b.innerHTML="";
  let search=($("search").value||'').toLowerCase();
  let list=[...data.users].filter(u=>u.u.toLowerCase().includes(search)).filter(u=>!u.retired && !u.banned);
  if(tab==="overall"){
    list.sort((a,b)=>getELO(b)-getELO(a));
    $("tableHead").innerHTML=`<tr><th>Rank</th><th>Player</th><th>Cart</th><th>Crystel</th><th>Mace</th><th>Sword</th><th>Kit</th><th>ELO</th></tr>`;
  }else{
    list.sort((a,b)=>(b.stats[tab]||0)-(a.stats[tab]||0));
    $("tableHead").innerHTML=`<tr><th>Rank</th><th>Player</th><th>${tab.toUpperCase()}</th></tr>`;
  }
  list.forEach((u,i)=>{
    let row=document.createElement("tr");
    if(i===0) row.classList.add("gold");
    if(i===1) row.classList.add("silver");
    if(i===2) row.classList.add("bronze");
    if(tab==="overall"){
      row.innerHTML=`<td>${i===0?"🥇":i===1?"🥈":i===2?"🥉":i+1}</td><td><b>${escapeHtml(u.u)}</b><div class="rank">${getRank(i+1)}</div></td><td>${u.stats.cart}</td><td>${u.stats.crystel}</td><td>${u.stats.mace}</td><td>${u.stats.sword}</td><td>${u.stats.kit}</td><td><b>${getELO(u)}</b></td>`;
    }else{
      row.innerHTML=`<td>${i===0?"🥇":i===1?"🥈":i===2?"🥉":i+1}</td><td><b>${escapeHtml(u.u)}</b></td><td>${canEdit()?`<button onclick="change('${u.u}','${tab}',-1)">-</button>`:""}${u.stats[tab]}${canEdit()?`<button onclick="change('${u.u}','${tab}',1)">+</button>`:""}</td>`;
    }
    b.appendChild(row);
  });
  updateAI(list);
}

function showCommunityPage(page){
  communityPage = page;
  const path = '/community/' + page;
  if(window.location.pathname !== path){ window.history.pushState({}, '', path); }
  $("app").classList.add('hidden');
  $("profilePage").classList.add('hidden');
  $("adminPage").classList.add('hidden');
  $("communityOverlay").classList.remove('hidden');
  $("communityOverlay").innerHTML = `
    <div class="card">
      <button onclick="closeCommunityPage()">⬅ Back</button>
      <h2>${page === 'talk' ? '💬 Talk' : page === 'news' ? '📰 News' : page === 'pvp' ? '⚔ PVP Fights' : page === 'challenge' ? '🎯 Challenges' : 'ℹ Info'}</h2>
      <div id="communityContent"></div>
    </div>`;
  const content = $("communityContent");
  if(page==='info') renderInfoPage(content);
  if(page==='news') renderNewsPage(content);
  if(page==='talk') renderTalkPage(content);
  if(page==='pvp') renderPvpPage(content);
  if(page==='challenge') renderChallengePage(content);
}

function closeCommunityPage(){
  $("communityOverlay").classList.add('hidden');
  $("communityOverlay").innerHTML = '';
  $("app").classList.remove('hidden');
  window.history.pushState({}, '', '/');
}

function renderInfoPage(target){
  target.innerHTML = `
      <div class="communityCard">${escapeHtml(data.info || 'NO Info')}</div>
      ${current && (current.owner || current.admin) ? `<div id="infoEditor"><textarea id="infoText">${escapeHtml(data.info || '')}</textarea><br><button onclick="saveInfo()">Save Info</button></div>` : ''}`;
}

function saveInfo(){
  data.info = $("infoText").value;
  save();
  renderInfoPage($("communityContent"));
  alert('Info updated.');
}

function renderNewsPage(target){
  const canPost = !!(current && (current.owner || current.newsReporter));
  const posts = [...(data.news || [])].sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt));
  target.innerHTML = `
      ${canPost ? `<div><input id="newsTitle" placeholder="Title"><textarea id="newsBody" placeholder="Write news..."></textarea><br><button onclick="postNews()">Post News</button></div>` : '<div class="communityCard">Login as a reporter or admin to post news.</div>'}
      <div style="margin-top:10px;">${posts.length ? posts.map(post => `
        <div class="communityItem">
          <div><b>${escapeHtml(post.title)}</b></div>
          <div class="small">By ${escapeHtml(post.author)} • ${new Date(post.createdAt).toLocaleString()}</div>
          <div>${escapeHtml(post.content)}</div>
          ${canEdit() ? `<button onclick="deleteNews(${post.id})">Delete</button>` : ''}
        </div>`).join('') : '<div class="communityCard">No news yet.</div>'}</div>`;
}

function postNews(){
  if(!current || !(current.owner || current.newsReporter)){ alert('Not allowed'); return; }
  const title = $("newsTitle").value.trim();
  const content = $("newsBody").value.trim();
  if(!title || !content){ alert('Add title and content'); return; }
  if(!data.news) data.news = [];
  data.news.push({ id: Date.now(), title, content, author: current.u, createdAt: new Date().toISOString() });
  save();
  renderNewsPage($("communityContent"));
}

function deleteNews(id){
  data.news = (data.news || []).filter(post => post.id !== id);
  save();
  renderNewsPage($("communityContent"));
}

function renderTalkPage(target){
  const msgs = [...(data.talk || [])].sort((a,b)=>new Date(a.createdAt)-new Date(b.createdAt));
  target.innerHTML = `
      <div id="talkList" class="chatBox">${msgs.length ? msgs.map(msg => `
        <div class="chatBubble">
          <strong>${escapeHtml(msg.author)}</strong>
          <div class="small">${new Date(msg.createdAt).toLocaleString()}</div>
          <div>${escapeHtml(msg.content)}</div>
          ${canEdit()?`<button onclick="deleteTalk(${msg.id})">Delete</button>`:''}
        </div>`).join('') : '<div class="communityCard">No talk yet.</div>'}</div>
      ${current ? `<textarea id="talkBody" placeholder="Write a message..."></textarea><br><button onclick="postTalk()">Send</button>` : '<div class="communityCard">Login to send a message.</div>'}`;
}

function postTalk(){
  if(!current){ alert('Login to post'); return; }
  const content = $("talkBody").value.trim();
  if(!content){ alert('Enter a message'); return; }
  if(!data.talk) data.talk = [];
  data.talk.push({ id: Date.now(), author: current.u, content, createdAt: new Date().toISOString() });
  save();
  renderTalkPage($("communityContent"));
}

function deleteTalk(id){
  data.talk = (data.talk || []).filter(msg => msg.id !== id);
  save();
  renderTalkPage($("communityContent"));
}

function renderPvpPage(target){
  const fights = [...(data.pvp || [])].sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt));
  target.innerHTML = `
      ${current ? `<input id="pvpTitle" placeholder="Fight title"><input id="pvpLink" placeholder="Video link or file URL"><button onclick="postPvp()">Post Fight</button>` : '<div class="communityCard">Login to post fights.</div>'}
      <div style="margin-top:10px;">${fights.length ? fights.map(fight => `
        <div class="communityItem">
          <div><b>${escapeHtml(fight.title)}</b></div>
          <div class="small">By ${escapeHtml(fight.author)} • ${new Date(fight.createdAt).toLocaleString()}</div>
          <div><a href="${escapeHtml(fight.link)}" target="_blank">Open video</a></div>
          ${canEdit()?`<button onclick="deletePvp(${fight.id})">Delete</button>`:''}
        </div>`).join('') : '<div class="communityCard">No PVP fights posted yet.</div>'}</div>`;
}

function postPvp(){
  if(!current){ alert('Login to post'); return; }
  const title = $("pvpTitle").value.trim();
  const link = $("pvpLink").value.trim();
  if(!title || !link){ alert('Add title and link'); return; }
  if(!data.pvp) data.pvp = [];
  data.pvp.push({ id: Date.now(), title, link, author: current.u, createdAt: new Date().toISOString() });
  save();
  renderPvpPage($("communityContent"));
}

function deletePvp(id){
  data.pvp = (data.pvp || []).filter(fight => fight.id !== id);
  save();
  renderPvpPage($("communityContent"));
}

function renderChallengePage(target){
  const rows = [...(data.challenges || [])].sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt));
  const list = rows.map(ch => ({...ch, incoming: ch.toUser === current?.u}));
  target.innerHTML = `
      ${current ? `<input id="challengeTo" placeholder="Challenge username"><textarea id="challengeMessage" placeholder="Challenge message..."></textarea><br><button onclick="sendChallenge()">Send Challenge</button>` : '<div class="communityCard">Login to send challenges.</div>'}
      <div style="margin-top:10px;">${list.length ? list.map(ch => `
        <div class="communityItem">
          <div><b>${escapeHtml(ch.fromUser)} → ${escapeHtml(ch.toUser)}</b></div>
          <div class="small">${escapeHtml(ch.message)} • ${ch.status}</div>
          ${ch.incoming ? `<button onclick="respondToChallenge(${ch.id}, 'accepted')">Accept</button> <button onclick="respondToChallenge(${ch.id}, 'declined')">Decline</button>` : ''}
        </div>`).join('') : '<div class="communityCard">No challenges yet.</div>'}</div>`;
}

function sendChallenge(){
  if(!current){ alert('Login to challenge'); return; }
  const toUser = $("challengeTo").value.trim();
  const message = $("challengeMessage").value.trim();
  if(!toUser || !message){ alert('Enter username and message'); return; }
  if(!data.users.some(u => u.u.toLowerCase() === toUser.toLowerCase())){ alert('User not found'); return; }
  if(!data.challenges) data.challenges = [];
  data.challenges.push({ id: Date.now(), fromUser: current.u, toUser, message, status: 'pending', createdAt: new Date().toISOString() });
  save();
  renderChallengePage($("communityContent"));
}

function respondToChallenge(id, status){
  if(!current) return;
  const challenge = (data.challenges || []).find(ch => ch.id === id && ch.toUser === current.u);
  if(!challenge) return;
  challenge.status = status;
  save();
  renderChallengePage($("communityContent"));
}

function loadData(){
  try{
    const cached = JSON.parse(localStorage.getItem(KEY));
    if(cached && cached.users && cached.users.length){
      data = cached;
    } else {
      initData();
    }
  }catch(e){
    initData();
  }
  ensureOwnerAccount();
  save();
}

loadData();
render();
</script>
